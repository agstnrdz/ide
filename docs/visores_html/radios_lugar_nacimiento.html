<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Radios censales - Lugar de nacimiento</title>
  <style>html, body { margin:0; padding:0; }</style>
</head>
<body>

<!-- ═══════════ COPIAR DESDE AQUÍ HASTA "FIN BLOQUE" EN ELEMENTOR (widget HTML) ═══════════ -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  /* Popups compactos: fuerza el mismo interlineado dentro de WordPress */
  .leaflet-popup-content { line-height: 1.25 !important; margin: 8px 12px !important; }
  .leaflet-popup-content p, .leaflet-popup-content b { line-height: 1.25 !important; margin: 0 !important; }
  .leaflet-popup-content table td { line-height: 1.2 !important; padding-top: 0 !important; padding-bottom: 0 !important; }
</style>

<div class="visor-geo" id="visor-lugar-nacimiento" style="max-width:100%;font-family:system-ui,Segoe UI,Roboto,sans-serif;border:1px solid #e2dfe8;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);">

  <!-- Cabecera del visor: título + descripción + logo -->
  <div style="display:flex;align-items:center;gap:14px;padding:14px 18px;background:#134768;color:#fff;">
    <div>
      <div style="font-size:17px;font-weight:700;line-height:1.2;">Lugar de nacimiento por radio censal</div>
      <div style="font-size:12.5px;opacity:0.9;margin-top:2px;">Comodoro Rivadavia. 325 radios censales (Censo 2022). Población según lugar de nacimiento</div>
    </div>
    <img src="https://agstnrdz.github.io/ide/assets/img/logotipo_MCR_DGMIT_blanco.png"
         alt="Logo" style="height:44px;width:auto;flex-shrink:0;margin-left:auto;" onerror="this.style.display='none'">
  </div>

  <div id="map-lugar-nacimiento" style="height:520px;"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://agstnrdz.github.io/ide/layers_censo_gpkg_geojson/layers_js/radios_lugar_nacimiento_data.js"></script>

<script>
(function () {
  const map = L.map('map-lugar-nacimiento').setView([-45.83448112101565, -67.49450745314675], 12);

  // Mapa base: Argenmap (IGN)
  const argenmap = L.tileLayer('https://wms.ign.gob.ar/geoserver/gwc/service/tms/1.0.0/capabaseargenmap@EPSG%3A3857@png/{z}/{x}/{-y}.png', {
    attribution: 'Instituto Geográfico Nacional + OpenStreetMap | Fuente: INDEC, 2022. Procesamiento: Modernización e Investigación Territorial',
    minZoom: 3,
    maxZoom: 18
  }).addTo(map);

  // Mapa base: Satélite (Google)
  const satelite = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
    attribution: 'Imágenes © Google | Fuente: INDEC, 2022. Procesamiento: Modernización e Investigación Territorial',
    minZoom: 3,
    maxZoom: 20
  });

  const breaks = [3, 5, 7, 10];
  const colors = ['#eff3ff', '#bdd7e7', '#6baed6', '#2171b5', '#084594'];
  const labels = ['< 3 %', '3 – 5 %', '5 – 7 %', '7 – 10 %', '≥ 10 %'];
  const nullColor = '#d0cdd6';

  function getColor(val) {
    if (val == null || isNaN(val)) return nullColor;
    for (let i = breaks.length - 1; i >= 0; i--) if (val >= breaks[i]) return colors[i + 1];
    return colors[0];
  }

  // Valor que pinta la coropleta
  function valor(p) {
    return p.porc_extr;
  }

  const fmt = v => v != null ? Number(v).toLocaleString('es-AR', { maximumFractionDigits: 1 }) : 'Sin dato';
  const pct = (v, t) => (t > 0 && v != null) ? (v / t * 100).toFixed(1) + '%' : '—';

  function makePopup(p) {
    return `<b>Radio censal ${p.geo_id}</b><br>` +
      `Nacidos en Chubut: ${fmt(p.nac_chubut)} (${pct(p.nac_chubut, p.pers_total)})<br>` +
      `Nacidos en otra provincia: ${fmt(p.nac_otra_p)} (${pct(p.nac_otra_p, p.pers_total)})<br>` +
      `Nacidos en otro país: ${fmt(p.nac_otro_p)} (${pct(p.nac_otro_p, p.pers_total)})<br>` +
      `Total relevado: ${fmt(p.pers_total)} personas`;
  }

  const estilo = feat => ({
    fillColor:   getColor(valor(feat.properties)),
    fillOpacity: 0.75,
    color:       '#070707',
    weight:      1,
    opacity:     0.5
  });

  const capa = L.geoJSON(window.RADIOS_LUGAR_NACIMIENTO_DATA, {
    style: estilo,
    onEachFeature: (feat, layer) => {
      layer.bindPopup(makePopup(feat.properties), { maxWidth: 300 });
      layer.on('mouseover', () => layer.setStyle({ fillOpacity: 0.75, weight: 3 }));
      layer.on('mouseout',  () => layer.setStyle(estilo(feat)));
    }
  }).addTo(map);

  // Control de capas: mapas base (excluyentes) + capa de datos
  L.control.layers(
    { 'Argenmap (IGN)': argenmap, 'Satélite (Google)': satelite },
    { 'Lugar de nacimiento': capa },
    { collapsed: false }
  ).addTo(map);

  // Leyenda
  const legend = L.control({ position: 'bottomright' });
  legend.onAdd = function () {
    const div = L.DomUtil.create('div', 'info legend');
    div.style.cssText = 'background:#fff;padding:8px 10px;border-radius:8px;font-size:12px;line-height:1.5;box-shadow:0 1px 4px rgba(0,0,0,0.3)';
    div.innerHTML = '<strong>% nacidos en otro país</strong><br>';
    colors.forEach((c, i) => {
      div.innerHTML += `<span style="display:inline-block;width:12px;height:12px;background:${c};margin-right:6px;border:1px solid #999"></span>${labels[i]}<br>`;
    });
    div.innerHTML += `<span style="display:inline-block;width:12px;height:12px;background:${nullColor};margin-right:6px;border:1px solid #999"></span>Sin dato<br>`;
    return div;
  };
  legend.addTo(map);
})();
</script>
<!-- ═══════════ FIN BLOQUE ═══════════ -->

</body>
</html>
